<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST 111 Exam Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f3ead7;
  --bg-deep:#e4d2b0;
  --surface:rgba(255,250,242,.8);
  --surface-strong:#fffaf0;
  --surface-soft:#efe1c4;
  --border:rgba(55,42,25,.12);
  --border-strong:rgba(55,42,25,.22);
  --text:#201911;
  --muted:#6d6254;
  --accent:#0d5b4c;
  --accent-strong:#07382f;
  --accent-soft:#d8eee7;
  --success:#2f6b37;
  --warning:#ab6a08;
  --danger:#b03c2d;
  --shadow:0 28px 70px rgba(54,37,14,.16);
  --radius-lg:24px;
  --radius-md:18px;
  --radius-sm:14px;
  --font-sans:"Manrope","Segoe UI",sans-serif;
  --font-display:"Fraunces","Georgia",serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  min-height:100vh;
  font-family:var(--font-sans);
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.65), transparent 30%),
    radial-gradient(circle at 80% 0%, rgba(15,106,89,.16), transparent 24%),
    linear-gradient(145deg, #f6eedf 0%, var(--bg) 48%, var(--bg-deep) 100%);
}
body::before,
body::after{
  content:"";
  position:fixed;
  inset:auto;
  pointer-events:none;
  border-radius:999px;
  filter:blur(12px);
  opacity:.55;
}
body::before{
  width:220px;
  height:220px;
  top:72px;
  right:4vw;
  background:rgba(230,186,96,.24);
}
body::after{
  width:280px;
  height:280px;
  left:-40px;
  bottom:8vh;
  background:rgba(9,91,76,.12);
}
button,input,select,textarea{font:inherit}
button{border:none}
.page{
  position:relative;
  z-index:1;
  width:min(1180px,calc(100% - 28px));
  margin:20px auto;
}
.page-shell{
  overflow:hidden;
  border:1px solid var(--border);
  border-radius:34px;
  background:rgba(255,248,238,.72);
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px);
}
.site-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  padding:20px 24px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg, rgba(255,255,255,.45), rgba(255,255,255,.1));
}
.brand{
  display:flex;
  align-items:center;
  gap:14px;
}
.brand-mark{
  display:grid;
  place-items:center;
  width:46px;
  height:46px;
  border-radius:16px;
  font-family:var(--font-display);
  font-size:1.4rem;
  font-weight:700;
  color:#fff;
  background:linear-gradient(135deg, var(--accent), var(--accent-strong));
  box-shadow:0 16px 32px rgba(13,91,76,.24);
}
.brand-copy span{
  display:block;
  font-size:.72rem;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--muted);
}
.brand-copy strong{
  display:block;
  font-size:1.1rem;
  line-height:1.15;
}
.status-pill{
  padding:10px 14px;
  border:1px solid var(--border);
  border-radius:999px;
  font-size:.86rem;
  font-weight:700;
  color:var(--accent-strong);
  background:rgba(255,255,255,.48);
}
#app{padding:clamp(22px,3vw,34px)}
.dashboard,
.quiz-layout,
.result-layout{
  display:grid;
  gap:24px;
  grid-template-columns:minmax(0,1.45fr) minmax(290px,.88fr);
}
.hero-card,
.side-card,
.question-card,
.result-card{
  border:1px solid var(--border);
  border-radius:30px;
  background:linear-gradient(180deg, rgba(255,255,255,.86), rgba(255,248,239,.94));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.7);
}
.start-wrap,
.question-card,
.result-card{padding:clamp(22px,3vw,34px)}
.side-card{padding:24px}
.eyebrow,
.side-kicker,
.course-lbl{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-size:.73rem;
  font-weight:800;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--accent);
}
.eyebrow::before,
.side-kicker::before,
.course-lbl::before{
  content:"";
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 0 5px rgba(13,91,76,.12);
}
.start-title,
.side-title,
.q-text,
.score-big{
  font-family:var(--font-display);
  letter-spacing:-.03em;
}
.start-title{
  margin:14px 0 10px;
  font-size:clamp(2rem,4vw,3.6rem);
  line-height:.98;
}
.start-sub,
.side-copy,
.summary-text,
.question-note{
  color:var(--muted);
  line-height:1.7;
  font-size:1rem;
}
.hero-badges{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin:22px 0 26px;
}
.badge,
.focus-pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-radius:999px;
  font-size:.86rem;
  font-weight:700;
  color:var(--accent-strong);
  background:var(--accent-soft);
  border:1px solid rgba(13,91,76,.12);
}
.badge::before,
.focus-pill::before{
  content:"";
  width:7px;
  height:7px;
  border-radius:50%;
  background:currentColor;
}
.chapter-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(172px,1fr));
  gap:12px;
}
.ch-card{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:flex-start;
  gap:0;
  min-height:126px;
  padding:18px;
  text-align:left;
  border:1px solid var(--border);
  border-radius:22px;
  cursor:pointer;
  background:rgba(255,252,246,.9);
  transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease,background .18s ease;
}
.ch-card:hover{
  transform:translateY(-2px);
  border-color:rgba(13,91,76,.32);
  box-shadow:0 18px 34px rgba(52,38,20,.1);
}
.ch-card.active{
  border-color:rgba(13,91,76,.42);
  background:linear-gradient(180deg, rgba(216,238,231,.9), rgba(255,252,246,.92));
  box-shadow:0 18px 36px rgba(13,91,76,.12);
}
.ch-num,
.ch-count,
.meta-key,
.stat-l,
.mini-label{
  font-size:.78rem;
  color:var(--muted);
}
.ch-num{
  display:block;
  margin-bottom:8px;
  letter-spacing:.1em;
  text-transform:uppercase;
  font-weight:700;
}
.ch-name{
  display:block;
  font-size:1rem;
  line-height:1.35;
  font-weight:800;
}
.ch-count{display:block;margin-top:auto;padding-top:12px}
.meta-row,
.stats-row,
.mini-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:12px;
}
.meta-row{margin-top:24px}
.meta-box,
.stat-box,
.mini-card{
  padding:18px;
  border-radius:20px;
  background:linear-gradient(180deg, rgba(255,255,255,.72), rgba(239,225,196,.52));
  border:1px solid var(--border);
}
.meta-val,
.stat-n,
.mini-value{
  font-size:1.55rem;
  font-weight:800;
  color:var(--text);
}
.btn-row{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
}
.hero-actions,
.result-actions{margin-top:24px}
button{
  display:inline-flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  min-height:48px;
  padding:0 20px;
  border:1px solid var(--border-strong);
  border-radius:999px;
  cursor:pointer;
  color:var(--text);
  background:rgba(255,255,255,.68);
  transition:transform .18s ease,box-shadow .18s ease,background .18s ease,opacity .18s ease;
}
button:hover:not(:disabled){
  transform:translateY(-1px);
  box-shadow:0 12px 24px rgba(55,42,25,.12);
}
button.pri{
  color:#fff;
  border-color:transparent;
  background:linear-gradient(135deg, var(--accent), var(--accent-strong));
  box-shadow:0 16px 28px rgba(13,91,76,.28);
}
button.sec{
  background:rgba(255,255,255,.5);
}
button:disabled{
  opacity:.45;
  cursor:not-allowed;
  box-shadow:none;
  transform:none;
}
.side-title{
  margin:14px 0 12px;
  font-size:2rem;
  line-height:1;
}
.side-list{
  display:grid;
  gap:12px;
  margin:22px 0;
}
.side-item{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:14px 16px;
  border-radius:18px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.56);
}
.side-item span{color:var(--muted)}
.side-item strong{font-size:1.02rem}
.tip-box,
.question-note,
.fb{
  padding:16px 18px;
  border-radius:20px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.58);
}
.tip-box strong,
.question-note strong{display:block;margin-bottom:6px}
.hdr{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
  margin-bottom:22px;
}
.quiz-cluster{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.timer-box{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:12px 16px;
  border-radius:999px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.75);
  font-weight:800;
}
.dot{
  width:9px;
  height:9px;
  border-radius:50%;
  background:var(--success);
  animation:pulse 1.1s infinite;
  flex-shrink:0;
}
.dot.warn{background:var(--warning)}
.dot.dang{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.38}}
.prog-wrap{margin-bottom:24px}
.prog-meta{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-bottom:10px;
  color:var(--muted);
  font-size:.92rem;
}
.prog-bar{
  overflow:hidden;
  height:10px;
  border-radius:999px;
  background:rgba(32,25,17,.08);
}
.prog-fill{
  height:100%;
  border-radius:inherit;
  background:linear-gradient(90deg, var(--accent), #2e8776);
  transition:width .28s ease;
}
.q-text{
  margin:0 0 22px;
  font-size:clamp(1.65rem,2.2vw,2.25rem);
  line-height:1.15;
}
.opts{
  display:grid;
  gap:12px;
  margin-bottom:18px;
}
.opt{
  width:100%;
  padding:16px 18px;
  display:flex;
  align-items:flex-start;
  gap:14px;
  text-align:left;
  border:1px solid var(--border);
  border-radius:22px;
  background:rgba(255,252,246,.9);
}
.opt:hover:not(.dis):not(:disabled){
  background:rgba(255,255,255,.95);
  border-color:rgba(13,91,76,.28);
}
.opt.sel{
  border-color:rgba(13,91,76,.38);
  background:rgba(216,238,231,.44);
}
.opt.ok,
.opt.show-ok{
  border-color:rgba(47,107,55,.36);
  background:rgba(216,238,231,.82);
}
.opt.bad{
  border-color:rgba(176,60,45,.34);
  background:rgba(252,235,235,.88);
}
.opt.dis{cursor:default}
.ltr{
  flex-shrink:0;
  display:grid;
  place-items:center;
  width:34px;
  height:34px;
  border-radius:50%;
  border:1px solid var(--border-strong);
  font-size:.82rem;
  font-weight:800;
  color:var(--muted);
  background:rgba(255,255,255,.72);
}
.opt.ok .ltr,
.opt.show-ok .ltr{
  color:#fff;
  border-color:transparent;
  background:var(--success);
}
.opt.bad .ltr{
  color:#fff;
  border-color:transparent;
  background:var(--danger);
}
.opt-txt{
  font-size:1rem;
  line-height:1.55;
}
.question-note{margin-bottom:18px}
.fb{
  margin-bottom:18px;
  line-height:1.65;
}
.fb.ok{
  color:#214d28;
  border-color:rgba(47,107,55,.3);
  background:rgba(216,238,231,.92);
}
.fb.bad{
  color:#772620;
  border-color:rgba(176,60,45,.28);
  background:rgba(252,235,235,.92);
}
.score-big{
  font-size:clamp(3.8rem,8vw,6rem);
  line-height:.95;
}
.score-sub{
  margin:10px 0 16px;
  color:var(--muted);
  font-size:1rem;
}
.grade{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:40px;
  padding:0 16px;
  border-radius:999px;
  font-weight:800;
  margin-bottom:20px;
}
.summary-text{max-width:46ch;margin:0 auto 24px}
.kbd-list{
  display:grid;
  gap:10px;
  margin-top:18px;
}
.kbd-row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
  color:var(--muted);
}
.kbd-key{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:34px;
  height:34px;
  padding:0 10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.66);
  font-weight:800;
  color:var(--text);
}
.result-wrap{text-align:center}
.result-aside{text-align:left}
.result-aside .summary-text{margin:14px 0 0;max-width:none}
@media (max-width:960px){
  .dashboard,
  .quiz-layout,
  .result-layout{grid-template-columns:1fr}
}
@media (max-width:700px){
  .page{width:min(100% - 18px,1180px);margin:10px auto}
  .site-bar{
    flex-direction:column;
    align-items:flex-start;
    padding:18px;
  }
  #app{padding:18px}
  .meta-row,
  .stats-row,
  .mini-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .hdr{flex-direction:column}
}
@media (max-width:520px){
  .chapter-grid,
  .meta-row,
  .stats-row,
  .mini-grid{grid-template-columns:1fr}
  .start-title{font-size:2.35rem}
  .q-text{font-size:1.8rem}
  button{width:100%}
  .btn-row{flex-direction:column}
}
</style>
</head>
<body>
<div class="page">
  <div class="page-shell">
    <div class="site-bar">
      <div class="brand">
        <div class="brand-mark">G</div>
        <div class="brand-copy">
          <span>Course Practice</span>
          <strong>GST 111 Exam Studio</strong>
        </div>
      </div>
      <div class="status-pill">Standalone mock test</div>
    </div>
    <main id="app" aria-live="polite"></main>
  </div>
</div>
<script>
const ALL_Q=[
// ── CH1: Communication (15) ──
{ch:1,cht:"Ch.1 — Communication",q:"The originator of a message in the communication process is called the:",opts:["Decoder","Receiver","Encoder","Channel"],ans:2,exp:"The encoder is the sender who originates the message, converts thoughts into a transmittable form, and initiates the communication process."},
{ch:1,cht:"Ch.1 — Communication",q:"Which element converts a received signal back into an understandable message?",opts:["Channel","Encoding","Noise","Decoding"],ans:3,exp:"Decoding is the receiver's process of interpreting the transmitted signal into meaningful content. Without it, the communication cycle is incomplete."},
{ch:1,cht:"Ch.1 — Communication",q:"A lecturer repeats the key point while writing it on the board. Which principle does this illustrate?",opts:["Feedback","Channel selection","Redundancy","Encoding"],ans:2,exp:"Redundancy means conveying the same message through more than one channel or form to improve accuracy of reception."},
{ch:1,cht:"Ch.1 — Communication",q:"A student nodding continuously while a lecturer speaks is best classified as:",opts:["Verbal feedback","A paralinguistic cue","Non-verbal feedback reinforcing active listening","Proxemic communication"],ans:2,exp:"Nodding is a non-verbal feedback signal confirming to the sender that the message is being received — a key function of feedback in communication."},
{ch:1,cht:"Ch.1 — Communication",q:"In Shannon-Weaver's model, 'noise' is best understood as:",opts:["Loud sounds that disrupt a speaker's voice","Any interference that distorts the message during transmission","A physical barrier placed between sender and receiver","A technical fault in written communication only"],ans:1,exp:"Noise refers to any interference — physical, psychological, or semantic — that distorts the message, not merely audible sound."},
{ch:1,cht:"Ch.1 — Communication",q:"Communication is considered complete only when:",opts:["The encoder transmits the message","The message passes through the channel","The receiver decodes the message and provides feedback","The message is written down for reference"],ans:2,exp:"True communication is complete only when the receiver decodes and responds, confirming the message was received and understood."},
{ch:1,cht:"Ch.1 — Communication",q:"Which type of communication conveys meaning through gestures and facial expressions?",opts:["Verbal communication","Written communication","Non-verbal communication","Oral communication"],ans:2,exp:"Non-verbal communication encompasses all meaning conveyed without words — gestures, facial expressions, eye contact, posture, and proxemics."},
{ch:1,cht:"Ch.1 — Communication",q:"The medium through which a message travels from sender to receiver is the:",opts:["Encoder","Feedback","Channel","Context"],ans:2,exp:"The channel is the medium of transmission — air for speech, paper for writing, or electronic signals for digital communication."},
{ch:1,cht:"Ch.1 — Communication",q:"Which of the following is an example of intrapersonal communication?",opts:["A class debate between two students","A lecturer addressing 200 students","A person thinking through a problem silently","A phone call between two friends"],ans:2,exp:"Intrapersonal communication occurs within a single individual — thinking, self-reflection, and internal monologue with no external receiver."},
{ch:1,cht:"Ch.1 — Communication",q:"Psychological noise in communication refers to:",opts:["Physical sounds that disrupt a lecture","Mental states like bias or wandering attention that hinder reception","Poor handwriting that makes a message unreadable","Static on a telephone line"],ans:1,exp:"Psychological noise includes internal mental barriers — preconceptions, emotions, distractions, or prejudice — that prevent accurate decoding."},
{ch:1,cht:"Ch.1 — Communication",q:"'Context' in the communication process is best described as:",opts:["The words chosen by the encoder","The medium used to send the message","The circumstances and environment surrounding the communication","The feedback provided by the receiver"],ans:2,exp:"Context encompasses the physical setting, cultural environment, social circumstances, and background within which communication takes place."},
{ch:1,cht:"Ch.1 — Communication",q:"Mass communication differs from interpersonal communication primarily because:",opts:["It uses only written channels","It involves a large audience with limited direct feedback","It is always more accurate and unambiguous","It requires both parties to share the same language"],ans:1,exp:"Mass communication involves transmission to large, heterogeneous audiences — typically with delayed, indirect, or no immediate feedback."},
{ch:1,cht:"Ch.1 — Communication",q:"Semantic noise occurs when:",opts:["A microphone malfunctions during a speech","Words mean different things to sender and receiver","The receiver is physically far from the sender","Background music plays during a lecture"],ans:1,exp:"Semantic noise arises from differences in meaning attached to words or symbols by encoder and decoder — due to jargon, ambiguity, or cultural differences."},
{ch:1,cht:"Ch.1 — Communication",q:"The primary purpose of feedback in communication is to:",opts:["End the conversation","Allow the sender to verify the message was received and understood","Increase the volume of the message","Replace the need for a clear channel"],ans:1,exp:"Feedback enables the encoder to evaluate whether their message was accurately received — it closes the communication loop and allows correction if needed."},
{ch:1,cht:"Ch.1 — Communication",q:"When a lecturer pauses to ask 'Does everyone follow so far?', which function is being performed?",opts:["Encoding","Channel switching","Soliciting feedback","Proxemic adjustment"],ans:2,exp:"By checking comprehension, the lecturer is actively soliciting feedback — inviting the audience to confirm or question their understanding of the message."},

// ── CH2: Language Skills (15) ──
{ch:2,cht:"Ch.2 — Language Skills",q:"Which correctly distinguishes listening from hearing?",opts:["Hearing is voluntary; listening is involuntary","Listening requires language competence; hearing does not","Both require the same concentration","Hearing involves conscious evaluation of the speaker's message"],ans:1,exp:"Listening requires language competence to decode meaning. Hearing is passive — it occurs regardless of whether the hearer understands the language."},
{ch:2,cht:"Ch.2 — Language Skills",q:"'In addition' and 'Furthermore' are classified as which type of cue?",opts:["Concluding message cues","Enumeration cues","Additional message cues","Concessional position cues"],ans:2,exp:"Additional message cues signal that the speaker is supplementing an already-made point with further information."},
{ch:2,cht:"Ch.2 — Language Skills",q:"Register, as it relates to vocabulary development, means:",opts:["Total number of words a speaker commands","Language used specifically in a particular field or discipline","The emotional tone a speaker adopts","The pitch pattern of a speaker's voice"],ans:1,exp:"Register refers to specialised language used in a specific domain — legal, medical, academic — and mastering different registers expands vocabulary."},
{ch:2,cht:"Ch.2 — Language Skills",q:"Which listening technique involves mentally predicting the speaker's next point?",opts:["Concentrating","Returning","Anticipating","Following verbal cues"],ans:2,exp:"Anticipating — asking 'What will be said next?' — keeps the listener actively engaged and primes the mind for incoming content."},
{ch:2,cht:"Ch.2 — Language Skills",q:"'The main point here is...' and 'It is important to note that...' are examples of:",opts:["Enumeration cues","Additional message cues","Implicit message cues","Central message cues"],ans:3,exp:"Central message cues signal the most important points in a discourse, directing the listener's attention to core information."},
{ch:2,cht:"Ch.2 — Language Skills",q:"Which is NOT identified as a strategy for vocabulary development?",opts:["Wide reading","Memorising a dictionary page daily","Knowledge of register","Exposure to news media"],ans:1,exp:"The text identifies wide reading, register, idioms, news media, and science/technology — not rote dictionary memorisation — as vocabulary strategies."},
{ch:2,cht:"Ch.2 — Language Skills",q:"The spread of 'lockdown' during COVID-19 illustrates vocabulary development through:",opts:["Wide reading","Knowledge of figures of speech","Exposure to news media","Keeping pace with science and technology"],ans:2,exp:"These terms spread through media coverage of the pandemic — news media exposure introduces current terminology to language users."},
{ch:2,cht:"Ch.2 — Language Skills",q:"Having a clear purpose when listening is important because it:",opts:["Tells the listener how long the speech will last","Determines how loudly the listener should respond","Guides what the listener focuses on and how they process information","Prevents the listener from taking notes"],ans:2,exp:"Purpose shapes listening strategy — whether for gist, specific information, pleasure, or evaluation — and guides what the listener retains."},
{ch:2,cht:"Ch.2 — Language Skills",q:"'However', 'Nonetheless', and 'Notwithstanding' are examples of:",opts:["Additional message cues","Enumeration cues","Concessional position cues","Central message cues"],ans:2,exp:"These are concessional position cues — they show the speaker grants an opposing point while defending or returning to their original position."},
{ch:2,cht:"Ch.2 — Language Skills",q:"Grammar is best defined as:",opts:["A list of correct spellings","The system of rules that account for structural descriptions of a sentence","The emotional tone used in communication","Vocabulary used in formal settings"],ans:1,exp:"Grammar is the system of principles, conditions and rules universal to natural languages that governs how words are structured into meaningful sentences."},
{ch:2,cht:"Ch.2 — Language Skills",q:"'All in all', 'On the whole', and 'In conclusion' are examples of:",opts:["Additional message cues","Enumeration cues","Concluding message cues","Central message cues"],ans:2,exp:"These are concluding message cues — they signal the speaker is wrapping up and summarising the major points of their discourse."},
{ch:2,cht:"Ch.2 — Language Skills",q:"Listening is described as voluntary and conscious while hearing is:",opts:["Also voluntary and conscious","Involuntary and passive","Always more effective than listening","Independent of the language used"],ans:1,exp:"Hearing is involuntary — it happens without deliberate effort or volition from the hearer, unlike listening which is purposeful and active."},
{ch:2,cht:"Ch.2 — Language Skills",q:"Vocabulary is best described as:",opts:["The total number of letters in a language","The grammatical rules governing sentence structure","The total corpus of words a speaker has and can deploy for communication","The set of sounds a speaker can produce"],ans:2,exp:"Vocabulary is the total corpus of words a speaker has identified, organised, and can actively use for communication purposes."},
{ch:2,cht:"Ch.2 — Language Skills",q:"A listener who consciously refocuses wandering attention back to the speaker is applying:",opts:["Anticipating","Examining","Returning","Focusing on non-verbal cues"],ans:2,exp:"The 'Return' technique involves bringing attention back to the speaker whenever the listener realises their mind has drifted."},
{ch:2,cht:"Ch.2 — Language Skills",q:"Which of these is a verbal cue, NOT a non-verbal one?",opts:["The speaker's intonation","The speaker's facial expressions","'First of all, I want to say...'","The speaker's gestures"],ans:2,exp:"'First of all, I want to say...' is a verbal enumeration cue. Non-verbal cues comprise voice quality, intonation, facial expressions, and gestures."},

// ── CH3: Letter Writing (15) ──
{ch:3,cht:"Ch.3 — Letter Writing",q:"The correct salutation for a Roman Catholic Archbishop in a formal letter is:",opts:["Your Holiness","Dear Sir","Your Grace","Your Excellency"],ans:2,exp:"'Your Grace' is correct for a Roman Catholic Archbishop. 'Your Holiness' is for the Pope; 'Your Excellency' is for presidents, governors, and ambassadors."},
{ch:3,cht:"Ch.3 — Letter Writing",q:"In a fully blocked formal letter, the subscription appears at the:",opts:["Center of the page","Lower right corner","Upper left corner","Lower left corner"],ans:3,exp:"In a fully blocked letter, all elements including the subscription align to the left margin. Lower right is used only when paragraphs are indented."},
{ch:3,cht:"Ch.3 — Letter Writing",q:"Which belongs to informal letters but NOT formal ones?",opts:["Use of contractions like don't and won't","Brevity and directness","A complimentary close","Standard date formats"],ans:0,exp:"Contractions are explicitly prohibited in formal letters as signs of informality but are freely permitted in informal letters."},
{ch:3,cht:"Ch.3 — Letter Writing",q:"'Yours faithfully' is most appropriate when:",opts:["The writer and recipient share a close friendship","The letter is an internal office memo","The salutation used is Sir/Madam in a strictly formal letter","The letter is semi-formal in tone"],ans:2,exp:"'Yours faithfully' pairs with 'Sir/Madam' — used when the writer does not know the recipient personally and the letter is completely formal."},
{ch:3,cht:"Ch.3 — Letter Writing",q:"A semi-formal letter differs from a formal one primarily in that:",opts:["It has no title or salutation","Its structure is formal but its language is more friendly and less stiff","It is addressed only to family members","Its close is always 'Yours truly'"],ans:1,exp:"The semi-formal letter adopts formal structure but employs friendlier, less rigid language — suitable when the recipient is an acquaintance."},
{ch:3,cht:"Ch.3 — Letter Writing",q:"When the title of a formal letter is in all capital letters, it should:",opts:["Be underlined","Not be underlined","Be placed in quotation marks","Be written in italics"],ans:1,exp:"All-caps titles do not require underlining. Underlining is reserved for titles in initial capitals, especially in handwritten formal letters."},
{ch:3,cht:"Ch.3 — Letter Writing",q:"Which is an accepted standard date format for a formal letter?",opts:["10/08/20xx","10 August, 20xx","Aug-10-20xx","10.Aug.20xx"],ans:1,exp:"The three standard formats are: '10 August, 20xx', '10th August, 20xx', and 'August 10, 20xx'. Numerical shorthand is not acceptable."},
{ch:3,cht:"Ch.3 — Letter Writing",q:"The opening paragraph of a formal application letter should:",opts:["List the applicant's qualifications in full","State the source of information and the position being applied for","Mention the applicant's salary expectation","Describe the applicant's personal life"],ans:1,exp:"The opening paragraph identifies where the applicant saw the vacancy and states the specific post being applied for."},
{ch:3,cht:"Ch.3 — Letter Writing",q:"Which contraction is acceptable in an informal letter but must be avoided in a formal one?",opts:["Cannot","Will not","Don't","Should not"],ans:2,exp:"Contractions like 'don't' are prohibited in formal letters. Spelled-out forms ('do not') are required in formal writing."},
{ch:3,cht:"Ch.3 — Letter Writing",q:"The sender's address in a formal letter is placed at the:",opts:["Top left corner","Center of the page","Top right corner","Bottom of the letter"],ans:2,exp:"In a formal letter, the sender's address appears at the top right corner. The receiver's address goes at the top left, slightly lower."},
{ch:3,cht:"Ch.3 — Letter Writing",q:"The correct salutation when writing formally to a Senator is:",opts:["Your Excellency","Distinguished Senator","Your Highness","Your Grace"],ans:1,exp:"'Distinguished Senator' is the correct salutation for Senators. 'Your Excellency' is reserved for presidents, governors, ambassadors, and the Senate President."},
{ch:3,cht:"Ch.3 — Letter Writing",q:"The inside address of a formal letter refers to:",opts:["The sender's address at the top right","The receiver's address placed at the top left","The date below the sender's address","The signature block at the bottom"],ans:1,exp:"The inside address is the recipient's address, placed at the top left corner, slightly lower than the sender's address at the top right."},
{ch:3,cht:"Ch.3 — Letter Writing",q:"'Yours sincerely' in a formal letter is described as:",opts:["The most formal closing possible","Less formal than 'Yours faithfully', used to foster cordiality","Appropriate only for informal letters","Incorrect in all formal letters"],ans:1,exp:"'Yours sincerely' is less formal than 'Yours faithfully' and is adopted by organisations wanting to maintain cordiality with clients."},
{ch:3,cht:"Ch.3 — Letter Writing",q:"In an informal letter, the date may be:",opts:["Omitted entirely","Abbreviated","Written only in Roman numerals","Always placed at the bottom"],ans:1,exp:"The date in an informal letter may be abbreviated — a flexibility not permitted in formal letters."},
{ch:3,cht:"Ch.3 — Letter Writing",q:"A specifically identified feature of the formal letter's language is:",opts:["Free use of idioms and proverbs","Avoidance of contractions and colloquial expressions","Use of nicknames for the recipient","Emotional and personal tone throughout"],ans:1,exp:"Formal letters must avoid contractions, phrasal verbs, idioms, proverbs, and expressions of familiarity — maintaining strictly formal diction."},

// ── CH4: Report Writing (15) ──
{ch:4,cht:"Ch.4 — Report Writing",q:"A government panel investigates the cause of a campus fire and submits findings. This is best classified as:",opts:["Routine report","Informational report","Investigative report","Analytical report"],ans:2,exp:"An investigative report is produced when a writer is given specific terms of reference to find the cause of an incident and make recommendations."},
{ch:4,cht:"Ch.4 — Report Writing",q:"Which quality ensures the writer's personal emotions do not distort a report's findings?",opts:["Conciseness","Completeness","Clarity","Objectivity"],ans:3,exp:"Objectivity requires the report to reflect facts dispassionately — the writer's prejudices and sentiments must not colour the information."},
{ch:4,cht:"Ch.4 — Report Writing",q:"A report in memo format is most suitable for:",opts:["A police accident report sent to a commissioner","A technical feasibility study for external clients","An internal proposal within an organisation","A communiqué after an international summit"],ans:2,exp:"The memo format is designed for internal use — proposals and reports exchanged within the same organisation."},
{ch:4,cht:"Ch.4 — Report Writing",q:"Laboratory reports are primarily distinguished by:",opts:["Being always written in first person","Beginning with an abstract and using graphs of experimental data","Focusing on communal disputes","Being presented orally to a panel"],ans:1,exp:"Lab reports are scientific — they begin with an abstract and present experimental findings using graphs, tables, and formulae."},
{ch:4,cht:"Ch.4 — Report Writing",q:"A school semester result issued every term is an example of:",opts:["Special report","Technical report","Routine report","Analytical report"],ans:2,exp:"Routine reports are produced at specific, designated periods. Semester results are a classic example of a routine report."},
{ch:4,cht:"Ch.4 — Report Writing",q:"Which report type gauges public reaction to a policy before it is implemented using charts and graphs?",opts:["Informational report","Technical report","Routine report","Analytical report"],ans:3,exp:"An analytical report examines public response to official policies before implementation, often prepared by social scientists."},
{ch:4,cht:"Ch.4 — Report Writing",q:"The W5H approach — Who? What? Where? When? Why? How? — is most associated with:",opts:["Laboratory report","Technical report","Police report","Book review"],ans:2,exp:"The W5H framework is the structural approach used for police reports, which require detailed, chronological, factual narrative accounts."},
{ch:4,cht:"Ch.4 — Report Writing",q:"Which is NOT a main purpose of a report?",opts:["To provide information","To entertain and amuse the reader","To report findings and conclusions","To make recommendations"],ans:1,exp:"The four main purposes of reports are: providing information, submitting opinions, reporting findings, and making recommendations. Entertainment is not among them."},
{ch:4,cht:"Ch.4 — Report Writing",q:"A technical report is the most complex kind primarily because it:",opts:["Is always the shortest report type","Can be written by anyone without special knowledge","Involves investigation, terms of reference, and is prepared by experts","Is presented verbally to a committee"],ans:2,exp:"Technical reports involve thorough investigation, terms of reference, extensive charts, and must be prepared by subject-matter experts."},
{ch:4,cht:"Ch.4 — Report Writing",q:"'Completeness' as a quality of a report means:",opts:["The report must be very long","The terms of reference are fully analysed and opinions, facts, and recommendations are presented separately","The report must have exactly five sections","The report must include photographs"],ans:1,exp:"Completeness means fully addressing all terms of reference and separating opinions, facts, findings, and recommendations into distinct sections."},
{ch:4,cht:"Ch.4 — Report Writing",q:"Which format takes the features of a formal letter and is used for reports directed to a specific person?",opts:["Schematic format","Memo format","Letter format","Technical format"],ans:2,exp:"The letter format adopts features of a formal letter and is used for reports specifically addressed to the individual or office that requested them."},
{ch:4,cht:"Ch.4 — Report Writing",q:"An informational report is best described as:",opts:["A lengthy investigation with expert analysis","A brief report that guides decision-making, often oral and transient in value","A detailed analysis of policy before implementation","A scientific experiment written for a lab supervisor"],ans:1,exp:"Informational reports are mostly brief, often oral, and have transient value — like weather forecasts and traffic situation reports."},
{ch:4,cht:"Ch.4 — Report Writing",q:"The schematic format is characterised by:",opts:["Having no headings","Taking the features of an internal memo","Major headings and subheadings in order of subordination, with headings centred and capitalised","Being used only for laboratory reports"],ans:2,exp:"The schematic format uses major headings (centred and capitalised) and subheadings hierarchically — used for minutes, term papers, and book reviews."},
{ch:4,cht:"Ch.4 — Report Writing",q:"A report commissioned to examine boundary disputes between two communities falls under:",opts:["Routine report","Informational report","Special report","Laboratory report"],ans:2,exp:"Special reports are necessitated by sudden events — including communal clashes and boundary disputes — requiring a panel of enquiry."},
{ch:4,cht:"Ch.4 — Report Writing",q:"Which quality demands information be presented straightforwardly with apt diction to minimise unnecessary words?",opts:["Completeness","Objectivity","Precision","Clarity"],ans:2,exp:"Precision requires clear, straight-forward presentation with apt diction — minimising verbosity while maintaining accuracy."},

// ── CH5: Book Review & Minutes (15) ──
{ch:5,cht:"Ch.5 — Book Review & Minutes",q:"A reviewer notes a novel's chapters are disproportionate in length. This belongs under:",opts:["Introduction","Content","Evaluation","Recommendation"],ans:2,exp:"Evaluating proportionality falls under Evaluation — where the reviewer critically assesses quality and how well the book achieves its objectives."},
{ch:5,cht:"Ch.5 — Book Review & Minutes",q:"Book reviews typically require no references because:",opts:["They are shorter documents","The data comes from reading the text itself, not external sources","Book reviews are considered informal exercises","They follow the memo format which excludes documentation"],ans:1,exp:"In book review, the primary data source is the book itself. Since no external research is conducted, documentation of outside sources is not required."},
{ch:5,cht:"Ch.5 — Book Review & Minutes",q:"Which statement about minutes writing is INCORRECT?",opts:["Minutes are written in the past tense","Minutes are written in reported speech except where motions are involved","'The minutes was adopted unanimously' is grammatically acceptable","Contributors to deliberations are usually anonymous"],ans:2,exp:"'The minutes was...' is incorrect. 'Minutes' is always plural and takes a plural verb: 'The minutes were adopted unanimously.'"},
{ch:5,cht:"Ch.5 — Book Review & Minutes",q:"Adopted minutes must be signed by:",opts:["The chairman alone","All members present","Both the secretary and the chairman","The secretary and most senior member"],ans:2,exp:"Minutes must be signed by both the secretary and chairman to be officially valid and legally admissible as evidence by external bodies including courts."},
{ch:5,cht:"Ch.5 — Book Review & Minutes",q:"The section where the reviewer urges the audience to acquire the book is:",opts:["Evaluation","Content","Conclusion","Recommendation"],ans:3,exp:"The Recommendation section flows from the conclusion and is where the reviewer enthusiastically encourages the audience to obtain a copy of the book."},
{ch:5,cht:"Ch.5 — Book Review & Minutes",q:"The direct words of a motion are an exception to which minutes rule?",opts:["Minutes must be brief","Minutes are written in the past tense","Minutes avoid redundancy","Minutes are always printed in full"],ans:1,exp:"Minutes are in past tense throughout, but the direct words of a motion may be quoted verbatim — the standard exception to the past-tense rule."},
{ch:5,cht:"Ch.5 — Book Review & Minutes",q:"Which is NOT a required component of the 'Attendance' section in minutes?",opts:["Present","Absent with Apology","Absent","The agenda items"],ans:3,exp:"The Attendance section covers Present, Absent with Apology, and Absent. The agenda is a separate document — not part of attendance."},
{ch:5,cht:"Ch.5 — Book Review & Minutes",q:"The Introduction of a book review should contain:",opts:["A comparison with other books by the same author","The aim or purpose of the book and brief author information","A full listing of errors found in the book","The reviewer's personal biography"],ans:1,exp:"The Introduction states the aim or purpose of the book and may include brief author background, often sourced from the blurb or publisher's website."},
{ch:5,cht:"Ch.5 — Book Review & Minutes",q:"'In Attendance' in minutes refers to:",opts:["Members who arrived late","Regular members who are present","Special attendees not regular members but present for a specific purpose","Members who sent written apologies"],ans:2,exp:"'In Attendance' lists special attendees — people not regular members of the group but present for a specific purpose related to that meeting's agenda."},
{ch:5,cht:"Ch.5 — Book Review & Minutes",q:"Book review is described as a marketing strategy because:",opts:["It generates revenue for the reviewer","It advertises the book and informs the public whether it is worth reading","It is always commissioned by publishers","It replaces the need for the reader to buy the book"],ans:1,exp:"Book review advertises the reviewed work by providing information that helps the reading public decide whether the book is worth purchasing."},
{ch:5,cht:"Ch.5 — Book Review & Minutes",q:"Minutes are always in reported speech EXCEPT when:",opts:["The chairperson gives an opening address","A member asks a question","Matters of motion and points of order are involved","A vote is taken on an agenda item"],ans:2,exp:"Direct speech is used when recording the exact words of a motion — to preserve the precise terms moved by a member."},
{ch:5,cht:"Ch.5 — Book Review & Minutes",q:"Under 'Organization of Contents', the reviewer should:",opts:["List the price and publisher's details","Describe how the book's sections or chapters are structured and what each contains","Evaluate the author's grammar and spelling","Recommend where to purchase the book"],ans:1,exp:"Organization of Contents describes how chapters are arranged — their order, what each covers, and how the structure supports the book's purpose."},
{ch:5,cht:"Ch.5 — Book Review & Minutes",q:"The three essential qualities of minutes are accuracy, clarity, and:",opts:["Length","Verbosity","Brevity","Formality"],ans:2,exp:"The text explicitly states the three essential qualities of minutes are accuracy, clarity, and brevity — unnecessary details have no place in minutes."},
{ch:5,cht:"Ch.5 — Book Review & Minutes",q:"If reviewing only one chapter of a book, the broad title should be:",opts:["Book Review","Literature Review","Chapter Review","Critical Analysis"],ans:2,exp:"When reviewing a single chapter, 'Chapter Review' is more appropriate than 'Book Review', though the same structural approach applies."},
{ch:5,cht:"Ch.5 — Book Review & Minutes",q:"Which minutes section names the member who moved for adjournment and states the time the meeting ended?",opts:["Matters Arising","Any Other Business","Adjournment","Attendance"],ans:2,exp:"The Adjournment section names the mover and seconder of adjournment and states the time at which the meeting officially ended."},

// ── CH6: Essay Writing (15) ──
{ch:6,cht:"Ch.6 — Essay Writing",q:"The word 'essay' is derived from the French word 'essayer', which means:",opts:["To write formally","To try or to attempt","To argue persuasively","To describe in detail"],ans:1,exp:"'Essay' comes from the French 'essayer' meaning 'to try' or 'to attempt' — reflecting the exploratory, argumentative nature of essay writing."},
{ch:6,cht:"Ch.6 — Essay Writing",q:"Which type of essay tells a story, usually in chronological order?",opts:["Descriptive essay","Argumentative essay","Expository essay","Narrative essay"],ans:3,exp:"A narrative essay tells a story in chronological order, using plot, characters, setting, and climax — often written in first-person."},
{ch:6,cht:"Ch.6 — Essay Writing",q:"The primary function of an expository essay is to:",opts:["Convince the reader to change their opinion","Create vivid pictures in the reader's mind","Explain, define, inform, or interpret a subject","Entertain by telling an engaging story"],ans:2,exp:"The primary function of exposition is to explain, define, inform, or interpret — not to persuade, tell stories, or create vivid descriptions."},
{ch:6,cht:"Ch.6 — Essay Writing",q:"In an argumentative essay, the writer's main point is technically referred to as the:",opts:["Premise","Conclusion","Topic sentence","Thesis"],ans:1,exp:"In logic-based argumentation, the writer's point of view is the 'conclusion', and the supporting reasons are called 'premises' — both terms drawn from logic."},
{ch:6,cht:"Ch.6 — Essay Writing",q:"Inductive reasoning in an argumentative essay moves from:",opts:["The general to the particular","The particular to the general","The emotional to the logical","The premise to the premise"],ans:1,exp:"Inductive reasoning starts from specific particular instances and builds toward a general conclusion — the opposite of deductive reasoning."},
{ch:6,cht:"Ch.6 — Essay Writing",q:"A paragraph is identified structurally by:",opts:["A title and a conclusion","Indentation or extra line space in block format","The use of bullet points","Starting with a capital letter only"],ans:1,exp:"The sign of a paragraph is indentation — the first line begins five spaces from the margin — or an extra line space in the block format."},
{ch:6,cht:"Ch.6 — Essay Writing",q:"A topic sentence in a paragraph primarily functions to:",opts:["Introduce the essay title","State the purpose of the paragraph and ensure unity, clarity and effectiveness","List all the points to be discussed in the essay","Provide a transition to the next paragraph"],ans:1,exp:"The topic sentence is a statement of the purpose of the paragraph — it makes for unity, clarity, and effectiveness of the paragraph's development."},
{ch:6,cht:"Ch.6 — Essay Writing",q:"Which paragraph development technique clarifies an idea by juxtaposing it with a different, better-known topic idea?",opts:["Illustration","Cause and effect","Contrast","Definition"],ans:2,exp:"The contrast method clarifies an idea by juxtaposing it with a different topic idea that is supposedly better known to the reader."},
{ch:6,cht:"Ch.6 — Essay Writing",q:"In essay writing, transition markers like 'but', 'however', and 'on the contrary' are used to indicate:",opts:["Progressive sequence","Contrast","Similarity","Conclusion"],ans:1,exp:"'But', 'however', and 'on the contrary' are transition markers used specifically to indicate contrast between two ideas or positions."},
{ch:6,cht:"Ch.6 — Essay Writing",q:"The three stages in writing an essay, in correct order, are:",opts:["Drafting, planning, revising","Revising, drafting, planning","Planning, drafting, revising","Planning, revising, drafting"],ans:2,exp:"The correct order is: Planning (thinking and outlining), Drafting (writing the first version), and Revising (reviewing and improving the draft)."},
{ch:6,cht:"Ch.6 — Essay Writing",q:"A descriptive essay is primarily designed to:",opts:["Convince the reader of a particular viewpoint","Tell a story in chronological sequence","Create a vivid picture in the reader's mind using sensory details","Explain a process step by step"],ans:2,exp:"A descriptive essay provides a detailed description using sensory details — sight, sound, smell, taste, and touch — to create a vivid picture in the reader's mind."},
{ch:6,cht:"Ch.6 — Essay Writing",q:"Transition markers like 'in the same way', 'likewise', and 'in the same vein' are used to show:",opts:["Contrast","Progressive sequence","Similarity","Concession"],ans:2,exp:"These transition markers show similarity — they link ideas that are alike or parallel in nature, helping the essay flow cohesively."},
{ch:6,cht:"Ch.6 — Essay Writing",q:"A persuasive essay is best described as a blend of:",opts:["Narration, description, and imagination","Description, argumentation, and exposition","Exposition, classification, and definition","Narration, exposition, and comparison"],ans:1,exp:"A persuasive essay blends description, argumentation, and exposition in order to persuade someone to accept the writer's point of view."},
{ch:6,cht:"Ch.6 — Essay Writing",q:"The enumeration technique in paragraph development uses ordinal numbers like 'first', 'second', 'third' to:",opts:["Define key terms one by one","List and develop points paragraph by paragraph","Show contrast between two ideas","Describe exterior features before interior ones"],ans:1,exp:"Ordinal number enumeration uses 'first', 'second', 'third' to list and develop successive points paragraph by paragraph in an essay."},
{ch:6,cht:"Ch.6 — Essay Writing",q:"When revising an essay, the writer should check for all of the following EXCEPT:",opts:["Spelling and punctuation errors","Parts that are hard to follow","The length of the essay compared to published novels","Flow of ideas and transition markers"],ans:2,exp:"Revision focuses on clarity, flow, transitions, spelling, and punctuation — not on comparing the essay's length to published novels."},

// ── CH7: The Sentence (15) ──
{ch:7,cht:"Ch.7 — The Sentence",q:"A sentence fragment is best described as:",opts:["A very short sentence with only a subject","A part of a sentence written as if it were a full sentence","A sentence with more than one clause","A sentence that begins without a capital letter"],ans:1,exp:"A sentence fragment is part of a sentence punctuated as if complete — it is largely meaningless in isolation because it does not ensure continuity of ideas."},
{ch:7,cht:"Ch.7 — The Sentence",q:"Which sentence type has exactly two main clauses and no subordinate clause?",opts:["Simple sentence","Compound sentence","Complex sentence","Multiple sentence"],ans:1,exp:"A compound sentence has two main clauses joined by a coordinating conjunction or semicolon — and no subordinate clause."},
{ch:7,cht:"Ch.7 — The Sentence",q:"The adjunct in a sentence is described as:",opts:["The mandatory part that cannot be omitted","An extra structure added for clarity that can be dropped without affecting grammatical form","The noun that performs the action of the verb","The verb that links subject to complement"],ans:1,exp:"An adjunct is an adverbial addition to an already complete sentence — it can be dropped without jeopardising the grammatical form."},
{ch:7,cht:"Ch.7 — The Sentence",q:"A compound-complex sentence must have a minimum of:",opts:["One main clause and one subordinate clause","Two main clauses and no subordinate clause","Three verbal groups — two independent and one subordinate","Three main clauses with no subordinate clause"],ans:2,exp:"A compound-complex sentence has a minimum of three verbal groups: two capable of standing alone (main clauses) and at least one subordinate clause."},
{ch:7,cht:"Ch.7 — The Sentence",q:"Subject/verb concord requires that:",opts:["Every sentence must have an adjunct","The subject and the verb agree in person and number","All pronouns must be in first person","Sentences must always end with a full stop"],ans:1,exp:"Subject/verb concord requires harmony between the subject and verb — singular subjects take singular verbs and plural subjects take plural verbs."},
{ch:7,cht:"Ch.7 — The Sentence",q:"Lexical ambiguity results from:",opts:["A word or phrase that can modify more than one constituent","A sentence having more than three clauses","A construction having more than one meaning due to a particular word","The absence of a subject in the sentence"],ans:2,exp:"Lexical ambiguity occurs when a construction has more than one meaning due to the presence of a specific ambiguous word — e.g., 'He went to the bank.'"},
{ch:7,cht:"Ch.7 — The Sentence",q:"In the sentence 'Many tourists from distant places visit the area', the simple subject is:",opts:["Many tourists from distant places","Tourists","Many tourists","Visit"],ans:1,exp:"The simple subject is the main noun or pronoun that names who or what the sentence is about — 'tourists', not the full noun phrase."},
{ch:7,cht:"Ch.7 — The Sentence",q:"A transitive verb differs from an intransitive verb in that it:",opts:["Can never be used in the passive voice","Takes a direct object while intransitive verbs do not","Is always a linking verb","Always appears at the end of a sentence"],ans:1,exp:"Transitive verbs take direct objects. Intransitive verbs do not — they express an action or state that is complete in itself without requiring a receiver."},
{ch:7,cht:"Ch.7 — The Sentence",q:"An indirect object in a sentence:",opts:["Follows the verb and receives the action directly","Names the person or thing to whom or for whom something is done","Modifies the verb like an adverb","Acts as the subject of the subordinate clause"],ans:1,exp:"An indirect object names the person or thing to whom or for whom the action of the verb is done — it comes before the direct object."},
{ch:7,cht:"Ch.7 — The Sentence",q:"The principle of parallelism in sentence construction requires:",opts:["Every sentence to have at least two clauses","Balance in structuring — a noun balanced with a noun, a verb with a verb","All verbs to be in the same tense throughout a paragraph","The subject to always appear at the beginning of the sentence"],ans:1,exp:"Parallelism requires grammatical balance: nouns must be balanced with nouns, verbs with verbs, phrases with equivalent phrases — to achieve structural harmony."},
{ch:7,cht:"Ch.7 — The Sentence",q:"'Every student and every lecturer is expected at the University Center.' This sentence illustrates:",opts:["Pronoun/antecedent concord","Time reference concord","Subject/verb concord with 'every' taking a singular verb","Structural ambiguity"],ans:2,exp:"When 'every' or 'each' introduces nouns joined by conjunctions, the verb remains singular — this is a subject/verb concord rule."},
{ch:7,cht:"Ch.7 — The Sentence",q:"Structural ambiguity arises when:",opts:["A single word has two unrelated dictionary meanings","A word or phrase can modify more than one constituent or can be involved in more than one relational association","A sentence has no subject","The verb does not agree with the subject"],ans:1,exp:"Structural ambiguity occurs when the placement or function of a word or phrase allows more than one interpretation — e.g., 'Visiting uncles can be boring.'"},
{ch:7,cht:"Ch.7 — The Sentence",q:"A finite verb is one that:",opts:["Never changes its form regardless of person, number, or tense","Changes its morphological shape depending on person, number, or time of event","Can only appear in subordinate clauses","Is always followed by a direct object"],ans:1,exp:"A finite verb changes its form based on person, number, and tense — e.g., 'works' (3rd person singular) vs 'work' (plural). Non-finite verbs remain unchanged."},
{ch:7,cht:"Ch.7 — The Sentence",q:"Which sentence pattern is represented by 'Akpan danced gracefully'?",opts:["S V O","S V A","S V C","S V Oi Od"],ans:1,exp:"'Akpan' = Subject, 'danced' = Verb, 'gracefully' = Adjunct (adverb) — giving the pattern S V A."},
{ch:7,cht:"Ch.7 — The Sentence",q:"An exclamatory sentence is primarily identified by:",opts:["Beginning with a wh-word","Ending with a question mark","Expressing emotion or state of mind, usually ending with an exclamation mark","Having no subject"],ans:2,exp:"Exclamatory sentences express emotion or a state of mind and are typically marked by the exclamation mark (!) at the end — e.g., 'How remarkably pleasant!'"},

// ── CH8: Sounds of English (18) ──
{ch:8,cht:"Ch.8 — Sounds of English",q:"The vowel /ɜ:/ as in 'girl' and 'bird' is best classified as:",opts:["A front close-mid vowel","A central monophthong","A back rounded vowel","A closing diphthong"],ans:1,exp:"/ɜ:/ is a central vowel — produced with the central part of the tongue raised — and a monophthong because the tongue holds a single position throughout."},
{ch:8,cht:"Ch.8 — Sounds of English",q:"/θ/ and /ð/ share which place of articulation?",opts:["Bilabial","Alveolar","Dental","Palato-alveolar"],ans:2,exp:"Both /θ/ ('thin') and /ð/ ('this') are dental consonants — produced with the tongue tip at or between the upper front teeth."},
{ch:8,cht:"Ch.8 — Sounds of English",q:"'REbel' (noun) vs 'reBEL' (verb) illustrates which phonological feature?",opts:["Phonemic intonation","Grammatical function of stress","Manner of articulation","Diphthong fusion"],ans:1,exp:"Stress shift signals a change in grammatical category — the same spelling produces different word classes depending on which syllable receives primary stress."},
{ch:8,cht:"Ch.8 — Sounds of English",q:"Rising intonation (Tune 2) is most appropriate for:",opts:["Nigeria is my country.","When did the exam start?","Is the assignment submitted?","Eat your food."],ans:2,exp:"Rising intonation is used for yes/no questions. Statements, wh-questions, commands, and exclamations use falling intonation (Tune 1)."},
{ch:8,cht:"Ch.8 — Sounds of English",q:"Which correctly lists all eight English diphthongs?",opts:["/eɪ/, /aɪ/, /aʊ/, /ɔɪ/, /əʊ/, /ɪə/, /eə/, /ʊə/","/i:/, /ɪ/, /e/, /æ/, /a:/, /ɒ/, /ɔ:/, /ʊ/","/p/, /b/, /t/, /d/, /k/, /g/, /tʃ/, /dʒ/","/eɪ/, /aɪ/, /ɪ/, /ʊ/, /ə/, /ɜ:/, /ɔɪ/, /aʊ/"],ans:0,exp:"English has exactly eight diphthongs: five closing (/eɪ/, /aɪ/, /aʊ/, /ɔɪ/, /əʊ/) and three centring (/ɪə/, /eə/, /ʊə/)."},
{ch:8,cht:"Ch.8 — Sounds of English",q:"A complete closure followed by a sudden release of airstream describes which manner of articulation?",opts:["Fricative","Nasal","Plosive","Lateral"],ans:2,exp:"Plosives (or stops) involve complete closure followed by sudden release — e.g., /p/, /b/, /t/, /d/, /k/, /g/."},
{ch:8,cht:"Ch.8 — Sounds of English",q:"Which set consists entirely of bilabial consonants?",opts:["/f/, /v/, /θ/, /ð/","/p/, /b/, /m/, /w/","/t/, /d/, /n/, /l/","/k/, /g/, /ŋ/"],ans:1,exp:"Bilabial consonants — produced using both lips — are: /p/ (voiceless plosive), /b/ (voiced plosive), /m/ (nasal), and /w/ (approximant)."},
{ch:8,cht:"Ch.8 — Sounds of English",q:"Intonation in English is primarily described as:",opts:["The loudness of syllables in a word","The rise and fall of pitch of the voice in speaking","The speed at which words are spoken","The clarity of consonant sounds"],ans:1,exp:"Intonation is defined as the rise and fall of pitch in speaking, conveying attitudes, emotions, and grammatical information beyond literal word meaning."},
{ch:8,cht:"Ch.8 — Sounds of English",q:"Affricates /tʃ/ and /dʒ/ differ from pure plosives because:",opts:["They are produced in the glottis","They involve no closure in the vocal tract","After the closure they release slowly with accompanying friction","They are produced only with the lips"],ans:2,exp:"Affricates begin like plosives (complete closure) but release slowly with friction — distinguishing them from plosives, which release suddenly."},
{ch:8,cht:"Ch.8 — Sounds of English",q:"A stressed syllable is characterised by:",opts:["Less vocal effort than neighbouring syllables","Equal emphasis with all other syllables","Greater vocal effort, longer duration, and raised pitch","A lower pitch than the final syllable"],ans:2,exp:"Stress (accentuation) is the prominence given to a syllable due to greater vocal effort, longer duration, and raised pitch."},
{ch:8,cht:"Ch.8 — Sounds of English",q:"Falling intonation (Tune 1) is used for all EXCEPT:",opts:["Statements and declarations","Wh-questions","Yes/No questions","Commands and exclamations"],ans:2,exp:"Yes/No questions take rising intonation (Tune 2). Falling intonation is used for statements, wh-questions, commands, and exclamations."},
{ch:8,cht:"Ch.8 — Sounds of English",q:"Sounds in which air escapes along the sides of the tongue are called:",opts:["Nasals","Fricatives","Laterals","Approximants"],ans:2,exp:"Laterals are produced when the airstream escapes along one or both sides of the tongue — the primary example in English is /l/."},
{ch:8,cht:"Ch.8 — Sounds of English",q:"The three criteria used to classify English vowels are:",opts:["Voice, place, and manner","Height of tongue, part of tongue raised, and lip shape","Plosion, friction, and nasality","Voicing, aspiration, and duration"],ans:1,exp:"English vowels are classified using: (1) height of the tongue, (2) which part of the tongue is raised (front/central/back), and (3) lip shape (rounded/unrounded)."},
{ch:8,cht:"Ch.8 — Sounds of English",q:"Which of the following is a centring diphthong?",opts:["/eɪ/ as in 'tame'","/aʊ/ as in 'cloud'","/ɪə/ as in 'fear'","/ɔɪ/ as in 'boy'"],ans:2,exp:"Centring diphthongs move towards the central vowel /ə/. The three centring diphthongs are /ɪə/, /eə/, and /ʊə/."},
{ch:8,cht:"Ch.8 — Sounds of English",q:"The glottal consonant /h/ is produced at:",opts:["Bilabial position","Alveolar ridge","Velar position","The glottis"],ans:3,exp:"/h/ is a glottal consonant — produced at the glottis (the space between the vocal cords) through friction as air passes through."},
{ch:8,cht:"Ch.8 — Sounds of English",q:"Velar consonants are produced by:",opts:["Both lips pressing together","The lower lip touching the upper teeth","The back of the tongue touching the soft palate","The tongue tip touching the upper teeth ridge"],ans:2,exp:"Velar consonants — /k/, /g/, /ŋ/ — are produced by the back of the tongue making contact with the velum (soft palate)."},
{ch:8,cht:"Ch.8 — Sounds of English",q:"A monophthong differs from a diphthong in that:",opts:["A monophthong is always voiced while a diphthong is voiceless","In a monophthong the tongue maintains one position; in a diphthong it moves from one vowel position to another","A monophthong can only appear at the start of a word","A diphthong is produced without tongue movement"],ans:1,exp:"In a monophthong, the tongue holds a single stable position. In a diphthong, the tongue glides from one vowel position toward another within the same syllable."},
{ch:8,cht:"Ch.8 — Sounds of English",q:"When listing items with intonation, the pattern is:",opts:["Tune 1 (falling) throughout","Tune 2 (rising) throughout","Rising for each item except the final one, which falls","Fall-rise for every item"],ans:2,exp:"Rising intonation (Tune 2) is used on each list item to signal continuation — the final item takes falling intonation to signal the list is complete."},

// ── CH9: Word Formation (15) ──
{ch:9,cht:"Ch.9 — Word Formation",q:"Which word formation process involves taking only the beginning of one word and joining it to the end of another?",opts:["Clipping","Acronym","Blending","Compounding"],ans:2,exp:"Blending combines the beginning of one word with the end of another — e.g., 'modem' from 'modulator' + 'demodulator'."},
{ch:9,cht:"Ch.9 — Word Formation",q:"'Bus' from 'omnibus' and 'phone' from 'telephone' are examples of:",opts:["Blending","Clipping","Affixation","Compounding"],ans:1,exp:"Clipping creates a new word by shortening another — reducing its length while retaining its meaning: 'bus' from 'omnibus', 'phone' from 'telephone'."},
{ch:9,cht:"Ch.9 — Word Formation",q:"The word 'AIDS' — Acquired Immune Deficiency Syndrome — is an example of:",opts:["Blending","Compounding","Acronym","Clipping"],ans:2,exp:"Acronyms are words formed from the initial letters of a phrase — AIDS, VCR, SCUBA, ATM. They can be pronounced as sequences of letters or as words."},
{ch:9,cht:"Ch.9 — Word Formation",q:"'Appletree' (noun + noun) and 'nationwide' (noun + adjective) are examples of:",opts:["Blending","Affixation","Compounding","Clipping"],ans:2,exp:"Compounding joins two or more formerly independent roots to form a single word — appletree (noun+noun) and nationwide (noun+adjective) are classic examples."},
{ch:9,cht:"Ch.9 — Word Formation",q:"In derivation, 'class-changing' refers to a process that:",opts:["Adds inflectional affixes to a word","Produces a new word in a different word class — e.g., computer (noun) → computerize (verb)","Shortens a word while keeping the same class","Joins two roots without changing either class"],ans:1,exp:"Class-changing derivation produces a word in a different grammatical class — e.g., 'computer' (noun) becomes 'computerize' (verb) through the -ize suffix."},
{ch:9,cht:"Ch.9 — Word Formation",q:"'Conversion' as a word formation process means:",opts:["Adding a prefix to change a word's meaning","Joining two words to form a compound","A word changing word class without any affixation","Shortening a word by removing syllables"],ans:2,exp:"Conversion (also called internal derivation) is when a word changes its grammatical class without any affixation — e.g., 'to hoover' (verb) from 'a hoover' (noun)."},
{ch:9,cht:"Ch.9 — Word Formation",q:"A prefix is defined as an affix that:",opts:["Occurs after the base or root of a word","Occurs before the root or base of a word","Replaces the root of a word entirely","Occurs in the middle of a word"],ans:1,exp:"A prefix is an affix that occurs before the root or base of a word — e.g., dis-allow, mis-guide, un-happy."},
{ch:9,cht:"Ch.9 — Word Formation",q:"The stem of a word is best described as:",opts:["The part of a word that never changes","The part to which the last morpheme is added","The first syllable of any word","The same thing as the root of a word"],ans:1,exp:"The stem is the part to which the last morpheme is added. In 'teachers', 'teach' is the root but 'teacher' is the stem to which -s is added."},
{ch:9,cht:"Ch.9 — Word Formation",q:"Inflection differs from derivation in that inflection:",opts:["Always changes the word class of the base","Creates brand new words with different meanings","Expresses morpho-syntactic categories like tense, voice, and number without changing word class","Produces words through shortening and combining"],ans:2,exp:"Inflection expresses grammatical categories (tense, number, voice) without changing the word class. Derivation creates new words, often changing the class."},
{ch:9,cht:"Ch.9 — Word Formation",q:"'Infotainment' (information + entertainment) and 'edutainment' (educate + entertainment) are examples of:",opts:["Clipping","Blending","Acronyms","Compounding"],ans:1,exp:"These are blends — words formed by combining the beginning of one word with the end of another to create a single new word."},
{ch:9,cht:"Ch.9 — Word Formation",q:"'Child' (noun) → 'childhood' (noun) is an example of which derivational process?",opts:["Class-changing derivation","Conversion","Class-maintaining derivation","Clipping"],ans:2,exp:"Class-maintaining derivation produces a new word without changing its grammatical class — 'child' and 'childhood' are both nouns."},
{ch:9,cht:"Ch.9 — Word Formation",q:"Affixes are described as bound morphemes because they:",opts:["Can stand alone as independent words","Cannot exist independently and must attach to a root or base","Always change the meaning of the root","Are always placed after the root"],ans:1,exp:"Affixes are bound morphemes — they cannot exist independently and must be attached to a root or base to have meaning (e.g., -ish, -ly, -er)."},
{ch:9,cht:"Ch.9 — Word Formation",q:"Suppletion in verb forms refers to:",opts:["Adding -ed to form the past tense regularly","Using a completely unrelated word as a particular form of a verb — e.g., 'went' as past of 'go'","Forming a noun by adding -ment to a verb","Joining two roots to form a compound verb"],ans:1,exp:"Suppletion occurs when an unrelated word is used as a specific form — 'went' is the past tense of 'go' but is etymologically unrelated to 'go'."},
{ch:9,cht:"Ch.9 — Word Formation",q:"Which of the following is an example of a verb + noun compound?",opts:["Appletree","Readymade","Pickpocket","Dropout"],ans:2,exp:"'Pickpocket' is formed from verb 'pick' + noun 'pocket'. 'Appletree' is noun+noun; 'readymade' is adjective+adjective; 'dropout' is verb+particle."},
{ch:9,cht:"Ch.9 — Word Formation",q:"The suffix -ize as in 'computerize', 'centralize', and 'valorize' is described in the text as:",opts:["Rare and unproductive","A class-maintaining derivational affix","A highly productive derivational affix","An inflectional morpheme expressing tense"],ans:2,exp:"The -ize suffix is described as highly productive — new formations using it continue to emerge freely in English, unlike -hood or -ose which are limited."},
{ch:9,cht:"Ch.9 — Word Formation",q:"SCUBA (Self-Contained Underwater Breathing Apparatus) can be pronounced as a single word rather than as individual letters. This type of acronym is called a:",opts:["Clip","Blend","Word acronym","Compound"],ans:2,exp:"SCUBA is an acronym pronounced as a word rather than spelled out letter by letter — distinguishing it from acronyms like VCR which are pronounced as individual letters."},

// ── CH10: Rhetoric & Public Speaking (15) ──
{ch:10,cht:"Ch.10 — Rhetoric & Public Speaking",q:"Aristotle defined rhetoric as:",opts:["The study of written language and grammar","The skill of speaking persuasively in public situations","The art of memorising speeches for public delivery","The technique of using visual aids in presentations"],ans:1,exp:"Aristotle defined rhetoric as the skill of speaking persuasively in public situations — the classical foundation of the discipline."},
{ch:10,cht:"Ch.10 — Rhetoric & Public Speaking",q:"The word 'rhetoric' originates from the Greek word 'eiro', which means:",opts:["I persuade","I write","I say","I listen"],ans:2,exp:"The word 'rhetoric' comes from the Greek 'eiro' meaning 'I say' — reflecting its origins in oral speech and public discourse."},
{ch:10,cht:"Ch.10 — Rhetoric & Public Speaking",q:"During the Medieval-Renaissance period, rhetoric transmuted into:",opts:["Scientific research and philosophical debate","The art of letter writing (ars dictaminis) and sermon writing (ars praedicandi)","Theatrical performance and dramatic arts","Mathematical logic and formal argument"],ans:1,exp:"In the Medieval-Renaissance period, rhetoric became the art of letter writing (ars dictaminis) and sermon writing (ars praedicandi), birthing the subject of homiletics."},
{ch:10,cht:"Ch.10 — Rhetoric & Public Speaking",q:"The extemporaneous method of speech delivery means:",opts:["Reading directly from a prepared script","Speaking the speech from memory after extensive rehearsal","Spoken without prior preparation","Delivering an outline on key points only"],ans:2,exp:"The extemporaneous method involves speaking without preparation — distinct from manuscript (scripted), memorised, and impromptu methods."},
{ch:10,cht:"Ch.10 — Rhetoric & Public Speaking",q:"The 'controlling idea' of a speech is contained in:",opts:["The outline of the speech","The visual aids selected","The subject sentence — a single sentence capturing the central idea","The mode of delivery chosen"],ans:2,exp:"The subject sentence (or framing sentence) is a single sentence containing the controlling idea of the speech — it guides what materials are gathered and how the speech is structured."},
{ch:10,cht:"Ch.10 — Rhetoric & Public Speaking",q:"Denotative meaning refers to:",opts:["Subjective feelings or attitudes associated with a word","The figurative or metaphorical use of a word","The literal dictionary meaning of a word","The technical jargon used in a specific field"],ans:2,exp:"Denotative meaning is the literal, dictionary definition of a word — as opposed to connotative meaning, which includes subjective associations and feelings."},
{ch:10,cht:"Ch.10 — Rhetoric & Public Speaking",q:"Which vocal characteristic refers to the speed of speech and the avoidance of filler words like 'um' and 'you know'?",opts:["Pitch","Volume","Rate","Resonance"],ans:2,exp:"Rate refers to the speed of speech delivery. Controlling rate involves avoiding filler words like 'um' and 'you know' that slow and distort delivery."},
{ch:10,cht:"Ch.10 — Rhetoric & Public Speaking",q:"Style in public speaking is best defined as:",opts:["What you say as opposed to how you say it","How you say something as opposed to what you say","The volume and pitch of the speaker's voice","The visual aids used during the speech"],ans:1,exp:"Style is defined as 'how you say something as opposed to what you say' — it encompasses word choice, sentence structure, tone, and delivery manner."},
{ch:10,cht:"Ch.10 — Rhetoric & Public Speaking",q:"The three components that define 'context' in language and situation are:",opts:["Encoding, decoding, and noise","Introduction, body, and conclusion","Field, mode, and tenor","Clarity, brevity, and coherence"],ans:2,exp:"Language and situation is analysed using Field (ongoing activity and purpose), Mode (method of transmission — spoken/written), and Tenor (degree of formality and relationship between parties)."},
{ch:10,cht:"Ch.10 — Rhetoric & Public Speaking",q:"Formal diction in public speaking is described as:",opts:["Relaxed, conversational everyday language","Specific terminology or jargon of a field","Sophisticated language used in standard or academic situations","Any language used in public settings"],ans:2,exp:"Formal diction involves sophisticated, elevated language appropriate for standard and academic situations — as opposed to informal or technical diction."},
{ch:10,cht:"Ch.10 — Rhetoric & Public Speaking",q:"Lisping is specifically defined in the text as:",opts:["Blocks and repetitions in speech","Mispronouncing 's' and 'z' as 'th' and 'sh'","A failure to stress the correct syllable","Substituting vowel sounds for consonant sounds"],ans:1,exp:"Lisping is defined as mispronouncing 's' and 'z' as 'th' and 'sh' — one of the speech defects public speakers must be aware of and work to correct."},
{ch:10,cht:"Ch.10 — Rhetoric & Public Speaking",q:"Which quality of style involves expressing ideas concisely without unnecessary words?",opts:["Clarity","Coherence","Brevity","Unity"],ans:2,exp:"Brevity is the quality of expressing ideas concisely — saying what needs to be said without padding, repetition, or unnecessary length."},
{ch:10,cht:"Ch.10 — Rhetoric & Public Speaking",q:"The Sophists, who began rhetoric in ancient Greece, were noted for:",opts:["Placing truth above persuasive ability","Instruction on a wide range of subjects, often placing persuasive ability above a regard for truth","Developing the art of letter writing and sermon delivery","Teaching only politicians and government officials"],ans:1,exp:"The Sophists taught oratorical skills but were noted for often placing persuasive ability above a regard for truth — a source of controversy in rhetorical history."},
{ch:10,cht:"Ch.10 — Rhetoric & Public Speaking",q:"Oral style differs from written style in that oral style is:",opts:["More formal, complex, and permanent","Conversational, immediate, and uses shorter sentences and more personal pronouns","Always delivered from a manuscript","Free of grammatical rules and structure"],ans:1,exp:"Oral style is conversational, immediate, and uses shorter sentences and personal pronouns — contrasting with written style which is more formal, complex, and permanent."},
{ch:10,cht:"Ch.10 — Rhetoric & Public Speaking",q:"Which step in speech preparation involves gathering statistical, narrative, or factual details to support the controlling idea?",opts:["Defining the purpose","Selecting a subject","Discovering materials","Drawing up the outline"],ans:2,exp:"Discovering materials involves gathering statistical, narrative, or factual details that support the controlling idea of the speech — filling in the content after the framework is set."},
];

const CHAPTERS=[
  {id:0,label:"All Chapters",short:"All"},
  {id:1,label:"Ch.1 — Communication",short:"Ch.1"},
  {id:2,label:"Ch.2 — Language Skills",short:"Ch.2"},
  {id:3,label:"Ch.3 — Letter Writing",short:"Ch.3"},
  {id:4,label:"Ch.4 — Report Writing",short:"Ch.4"},
  {id:5,label:"Ch.5 — Book Review & Minutes",short:"Ch.5"},
  {id:6,label:"Ch.6 — Essay Writing",short:"Ch.6"},
  {id:7,label:"Ch.7 — The Sentence",short:"Ch.7"},
  {id:8,label:"Ch.8 — Sounds of English",short:"Ch.8"},
  {id:9,label:"Ch.9 — Word Formation",short:"Ch.9"},
  {id:10,label:"Ch.10 — Rhetoric & Public Speaking",short:"Ch.10"},
];

const appEl=document.getElementById('app');

let mode='start',selCh=0,QS=[],cur=0,score=0,answered=false,chosen=-1;
let correct=0,wrong=0,timeLeft=0,timerInt=null,startTs=null;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function fmtT(s){const safe=Math.max(s,0);const m=Math.floor(safe/60),sec=safe%60;return`${m}:${sec.toString().padStart(2,'0')}`}
function qCount(ch){return ch===0?ALL_Q.length:ALL_Q.filter(q=>q.ch===ch).length}
function chapterName(label){return label.includes('—')?label.split('—')[1].trim():label}
function getChapterLabel(id){return id===0?'All Chapters':(CHAPTERS.find(c=>c.id===id)?.label||'Selected Chapter')}
function getChapterTitle(id){return id===0?'All Chapters':chapterName(getChapterLabel(id))}
function examMinutes(count){return Math.max(1,Math.ceil(count*1.2))}
function answeredCount(){return correct+wrong}
function accuracy(){return answeredCount()?Math.round(correct/answeredCount()*100):0}
function getTimeState(seconds){
  if(seconds<120)return{dot:'dot dang',color:'var(--danger)'};
  if(seconds<300)return{dot:'dot warn',color:'var(--warning)'};
  return{dot:'dot',color:'var(--text)'};
}
function getGradeMeta(pct){
  if(pct>=60)return{label:'Pass',fg:'#214d28',bg:'rgba(216,238,231,.95)'};
  if(pct>=50)return{label:'Borderline',fg:'#6b4208',bg:'rgba(250,238,218,.95)'};
  return{label:'Needs Review',fg:'#772620',bg:'rgba(252,235,235,.95)'};
}
function getResultSummary(pct){
  if(pct>=75)return'Excellent control. You can keep the full mixed paper in rotation and use chapter drills only for maintenance.';
  if(pct>=60)return'Solid pass. Review the missed explanations once, then retake the same set to tighten recall speed.';
  if(pct>=50)return'You are close, but there are still weak spots. Focus on the missed items before jumping back into the full paper.';
  return'This attempt surfaced the gaps clearly. Use a single-chapter drill next, then come back for another mixed mock.';
}
function render(){
  appEl.innerHTML=buildView();
  document.title=mode==='quiz'?`GST 111 · Question ${cur+1}`:'GST 111 Exam Studio';
}

function buildView(){
  if(mode==='start')return buildStart();
  if(mode==='quiz')return buildQuiz();
  return buildResult();
}

function buildStart(){
  const cnt=qCount(selCh);
  const mins=examMinutes(cnt);
  const selectedTitle=getChapterTitle(selCh);
  const introText=selCh===0
    ?'A full mixed mock across all 10 chapters. Best when you want realistic pressure and a broad revision sweep.'
    :'A focused drill for one chapter. Best when you want to attack a weak topic without the noise of the full syllabus.';
  const cards=CHAPTERS.map(c=>{
    const total=qCount(c.id);
    return`<button type="button" class="ch-card${selCh===c.id?' active':''}" onclick="selChapter(${c.id})" aria-pressed="${selCh===c.id}">
      <span class="ch-num">${c.id===0?'Complete drill':`Chapter ${c.id}`}</span>
      <span class="ch-name">${c.id===0?'All Chapters':chapterName(c.label)}</span>
      <span class="ch-count">${total} question${total!==1?'s':''} ready</span>
    </button>`;
  }).join('');
  return`<div class="dashboard">
    <section class="hero-card start-wrap">
      <span class="eyebrow">GST 111 Practice Suite</span>
      <h1 class="start-title">A cleaner CBT screen, with better flow and less clutter.</h1>
      <p class="start-sub">Pick one chapter for targeted revision or run the full bank for a proper mixed mock. Each answer reveals the explanation before you move on, so the test still doubles as revision.</p>
      <div class="hero-badges">
        <span class="badge">Instant explanations</span>
        <span class="badge">Timed automatically</span>
        <span class="badge">Mobile-friendly layout</span>
      </div>
      <div class="chapter-grid">${cards}</div>
      <div class="meta-row">
        <div class="meta-box"><div class="meta-val">${cnt}</div><div class="meta-key">Questions loaded</div></div>
        <div class="meta-box"><div class="meta-val">${mins} min</div><div class="meta-key">Session timer</div></div>
        <div class="meta-box"><div class="meta-val">60%</div><div class="meta-key">Pass mark</div></div>
      </div>
      <div class="btn-row hero-actions">
        <button type="button" class="pri" onclick="startQuiz()">Start ${selCh===0?'full mock':'chapter drill'}</button>
        <button type="button" class="sec" onclick="pickRandomChapter()">Pick random chapter</button>
      </div>
    </section>
    <aside class="side-card">
      <span class="side-kicker">Session Preview</span>
      <h2 class="side-title">${selectedTitle}</h2>
      <p class="side-copy">${introText}</p>
