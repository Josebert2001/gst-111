      <div class="focus-pill">${selCh===0?'Mixed exam mode':'Focused revision mode'}</div>
      <div class="side-list">
        <div class="side-item"><span>Coverage</span><strong>${selCh===0?'Chapters 1-10':getChapterLabel(selCh)}</strong></div>
        <div class="side-item"><span>Question bank</span><strong>${cnt}</strong></div>
        <div class="side-item"><span>Expected pace</span><strong>${Math.max(1,Math.round((mins*60)/cnt))} sec/question</strong></div>
      </div>
      <div class="tip-box">
        <strong>How the flow works</strong>
        <div class="question-note">Choose an option, submit to reveal feedback, then continue when you are ready. Skipping a question counts as missed so your score stays honest.</div>
      </div>
    </aside>
  </div>`;
}

function buildQuiz(){
  const q=QS[cur];
  const total=QS.length;
  const complete=answeredCount();
  const pct=total?Math.round((complete/total)*100):0;
  const remaining=Math.max(total-complete,0);
  const timerState=getTimeState(timeLeft);
  const actionLabel=answered?(cur===total-1?'See results':'Next question'):'Submit answer';
  const opts=q.opts.map((o,i)=>{
    let cls='opt';
    if(answered){
      cls+=' dis';
      if(i===q.ans)cls+=' show-ok';
      if(i===chosen&&chosen!==q.ans)cls+=' bad';
      if(i===chosen&&chosen===q.ans)cls+=' ok';
    }else if(i===chosen)cls+=' sel';
    return`<button type="button" class="${cls}" data-i="${i}" ${answered?'disabled':''} aria-pressed="${i===chosen}">
      <span class="ltr">${String.fromCharCode(65+i)}</span>
      <span class="opt-txt">${o}</span>
    </button>`;
  }).join('');
  const note=answered
    ?''
    :`<div class="question-note"><strong>Answer flow</strong>Pick one option or use keys <span class="kbd-key">1</span> to <span class="kbd-key">4</span>, then press <span class="kbd-key">Enter</span> to submit.</div>`;
  const fb=answered?`<div class="fb ${chosen===q.ans?'ok':'bad'}"><strong>${chosen===q.ans?'Correct.':'Incorrect.'}</strong> ${q.exp}</div>`:'';
  return`<div class="quiz-layout">
    <section class="question-card">
      <div class="hdr">
        <div class="quiz-cluster">
          <span class="course-lbl">GST 111 · Question ${cur+1} of ${total}</span>
          <div class="summary-text" style="margin:0;max-width:none">${q.cht}</div>
        </div>
        <div class="timer-box"><span class="${timerState.dot}"></span><span id="td" style="color:${timerState.color}">${fmtT(timeLeft)}</span></div>
      </div>
      <div class="prog-wrap">
        <div class="prog-meta"><span>${complete} answered</span><span>${pct}% complete</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>
      <h2 class="q-text">${q.q}</h2>
      <div class="opts" id="opts">${opts}</div>
      ${note}
      ${fb}
      <div class="btn-row">
        <button type="button" class="sec" onclick="skipQ()" ${answered?'disabled':''}>Skip question</button>
        <button type="button" class="pri" id="nb" onclick="nextQ()" ${!answered&&chosen===-1?'disabled':''}>${actionLabel}</button>
      </div>
    </section>
    <aside class="side-card">
      <span class="side-kicker">Live Summary</span>
      <div class="mini-grid">
        <div class="mini-card"><div class="mini-label">Correct</div><div class="mini-value" style="color:var(--success)">${correct}</div></div>
        <div class="mini-card"><div class="mini-label">Missed</div><div class="mini-value" style="color:var(--danger)">${wrong}</div></div>
        <div class="mini-card"><div class="mini-label">Accuracy</div><div class="mini-value">${accuracy()}%</div></div>
      </div>
      <div class="side-list" style="margin-top:18px">
        <div class="side-item"><span>Current topic</span><strong>${q.cht}</strong></div>
        <div class="side-item"><span>Questions remaining</span><strong>${remaining}</strong></div>
        <div class="side-item"><span>Selected mode</span><strong>${selCh===0?'All chapters':getChapterTitle(selCh)}</strong></div>
      </div>
      <div class="tip-box">
        <strong>Keyboard shortcuts</strong>
        <div class="kbd-list">
          <div class="kbd-row"><span>Choose option</span><span><span class="kbd-key">1</span> <span class="kbd-key">2</span> <span class="kbd-key">3</span> <span class="kbd-key">4</span></span></div>
          <div class="kbd-row"><span>Submit or continue</span><span class="kbd-key">Enter</span></div>
          <div class="kbd-row"><span>Skip</span><span class="kbd-key">S</span></div>
        </div>
      </div>
    </aside>
  </div>`;
}

function buildResult(){
  clearInterval(timerInt);
  const total=QS.length;
  const pct=total?Math.round((score/total)*100):0;
  const grade=getGradeMeta(pct);
  const elapsed=startTs?Math.round((Date.now()-startTs)/1000):0;
  const chLabel=getChapterLabel(selCh);
  return`<div class="result-layout">
    <section class="result-card result-wrap">
      <span class="eyebrow">Session Complete</span>
      <div class="score-big">${score}/${total}</div>
      <div class="score-sub">${pct}% · ${chLabel}</div>
      <div class="grade" style="background:${grade.bg};color:${grade.fg}">${grade.label}</div>
      <p class="summary-text">${getResultSummary(pct)}</p>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-n" style="color:var(--success)">${correct}</div><div class="stat-l">Correct</div></div>
        <div class="stat-box"><div class="stat-n" style="color:var(--danger)">${wrong}</div><div class="stat-l">Missed</div></div>
        <div class="stat-box"><div class="stat-n">${Math.floor(elapsed/60)}m ${elapsed%60}s</div><div class="stat-l">Time used</div></div>
      </div>
      <div class="btn-row result-actions" style="justify-content:center">
        <button type="button" class="sec" onclick="backToStart()">Change chapter</button>
        <button type="button" class="pri" onclick="retake()">Retake this set</button>
      </div>
    </section>
    <aside class="side-card result-aside">
      <span class="side-kicker">Next Step</span>
      <h2 class="side-title">${pct>=60?'Keep the momentum':'Tighten the weak spots'}</h2>
      <p class="side-copy">${selCh===0?'If the mixed paper felt heavy, switch to a single chapter next and clean up weak areas one block at a time.':'After a focused drill, jump back into the full mock to test transfer across chapters.'}</p>
      <div class="side-list">
        <div class="side-item"><span>Pass threshold</span><strong>60%</strong></div>
        <div class="side-item"><span>Accuracy</span><strong>${accuracy()}%</strong></div>
        <div class="side-item"><span>Recommended next move</span><strong>${pct>=60?'Retake or expand scope':'Review and retry'}</strong></div>
      </div>
      <div class="tip-box">
        <strong>What changed in this rebuild</strong>
        <div class="question-note">The app now runs as a proper standalone page, uses a complete theme instead of missing host variables, and keeps the score rules aligned with the visible 60% pass mark.</div>
      </div>
    </aside>
  </div>`;
}

function selChapter(id){selCh=id;render()}
function pickRandomChapter(){
  selCh=CHAPTERS[Math.floor(Math.random()*(CHAPTERS.length-1))+1].id;
  render();
}
function startQuiz(){
  QS=shuffle(selCh===0?[...ALL_Q]:ALL_Q.filter(q=>q.ch===selCh));
  if(!QS.length){mode='start';render();return;}
  cur=0;
  score=0;
  answered=false;
  chosen=-1;
  correct=0;
  wrong=0;
  timeLeft=examMinutes(QS.length)*60;
  startTs=Date.now();
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    timeLeft--;
    paintTimer();
    if(timeLeft<=0){
      clearInterval(timerInt);
      mode='result';
      render();
    }
  },1000);
  mode='quiz';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function paintTimer(){
  const el=document.getElementById('td');
  if(!el)return;
  const timerState=getTimeState(timeLeft);
  el.textContent=fmtT(timeLeft);
  el.style.color=timerState.color;
  const dotEl=el.previousElementSibling;
  if(dotEl)dotEl.className=timerState.dot;
}
function nextQ(){
  if(!answered){
    if(chosen===-1)return;
    answered=true;
    if(chosen===QS[cur].ans){score++;correct++;}
    else wrong++;
    render();
    return;
  }
  cur++;
  if(cur>=QS.length){
    mode='result';
    render();
    return;
  }
  answered=false;
  chosen=-1;
  render();
}
function skipQ(){
  if(answered)return;
  wrong++;
  cur++;
  if(cur>=QS.length){
    mode='result';
    render();
    return;
  }
  answered=false;
  chosen=-1;
  render();
}
function retake(){startQuiz()}
function backToStart(){
  clearInterval(timerInt);
  mode='start';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function selectOption(index){
  if(answered)return;
  chosen=index;
  document.querySelectorAll('.opt').forEach(opt=>{
    opt.classList.toggle('sel',Number(opt.dataset.i)===index);
  });
  const nextButton=document.getElementById('nb');
  if(nextButton)nextButton.removeAttribute('disabled');
}

appEl.addEventListener('click',e=>{
  const opt=e.target.closest('.opt');
  if(!opt||answered)return;
  selectOption(Number(opt.dataset.i));
});

document.addEventListener('keydown',e=>{
  if(mode!=='quiz')return;
  const tag=document.activeElement?.tagName||'';
  if(['INPUT','TEXTAREA','SELECT'].includes(tag))return;
  if(!answered&&['1','2','3','4'].includes(e.key)){
    const index=Number(e.key)-1;
    if(QS[cur]?.opts?.[index]!==undefined){
      e.preventDefault();
      selectOption(index);
    }
    return;
  }
  if(e.key==='Enter'){
    e.preventDefault();
    nextQ();
    return;
  }
  if((e.key==='s'||e.key==='S')&&!answered){
    e.preventDefault();
    skipQ();
  }
});

mode='start';
render();
</script>
</body>
</html>
